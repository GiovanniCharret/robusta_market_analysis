<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBUSTA · ticker</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body>

  <main class="tk-app">

    <div class="tk-crumb">
      <a href="index.html">← ROBUSTA</a>
      <a href="/data/latest.xlsx" download="robusta-latest.xlsx" class="download-btn">
        <span class="arrow">↓</span> excel
      </a>
    </div>

    <div class="tk-head">
      <div class="name" id="tk-name">…</div>
      <div class="price" id="tk-price">—</div>
    </div>
    <div class="tk-sub">
      <span id="tk-subsetor">—</span>
      <span id="tk-stamp">—</span>
    </div>

    <div class="status" id="status" hidden></div>

    <div id="blocks" hidden>

      <section class="block">
        <div class="block-title">avaliação fundamentalista</div>
        <div class="fund-row">
          <div class="stat">
            <div class="k">score</div>
            <div class="v accent" id="fund-score">—</div>
            <div class="sub">escala 4–40 · soma das classes 1–10</div>
          </div>
          <div class="stat">
            <div class="k">sinal</div>
            <div class="v" id="fund-sinal">—</div>
            <div class="sub" id="fund-sinal-sub">baseado no ranking</div>
          </div>
          <div class="stat">
            <div class="k">posição setorial</div>
            <div class="v" id="fund-pos">—</div>
            <div class="sub">vs pares do setor</div>
          </div>
        </div>
      </section>

      <section class="block">
        <div class="ruler" id="ruler"></div>
        <div class="meta-pair">
          <div class="item">
            <div class="k">distância da MMA50</div>
            <div class="v" id="fund-pct-mma50">—</div>
          </div>
          <div class="item">
            <div class="k">std_raking_value</div>
            <div class="v" id="meta-std">—</div>
          </div>
          <div class="item">
            <div class="k">momentum_break</div>
            <div class="v" id="meta-momentum">—</div>
          </div>
        </div>
      </section>

      <section class="block carteira">
        <div class="block-title">Carteira</div>
        <div class="carteira-table" id="carteira-table" role="table">
          <div class="h">ticker</div>
          <div class="h"></div>
          <div class="h r">preço</div>
        </div>
      </section>

    </div>
  </main>

  <script src="assets/app.js"></script>
  <script>
    (async function () {
      const $ = (id) => document.getElementById(id);
      const R = window.ROBUSTA;

      const ticker = R.getTickerParam();
      if (!ticker) {
        $("status").hidden = false;
        $("status").classList.add("error");
        $("status").textContent =
          "Sem ticker na URL. Use ticker.html?ticker=PRIO3";
        return;
      }
      document.title = `ROBUSTA · ${ticker}`;

      try {
        const dados = await R.carregaDados();
        const dado = dados.tickers[ticker];

        if (!dado) {
          $("status").hidden = false;
          $("status").classList.add("error");
          $("status").textContent = `Ticker ${ticker} não encontrado na última run.`;
          $("tk-name").textContent = ticker;
          return;
        }

        // Header
        const naCarteira = (dados.carteira || []).includes(ticker);
        $("tk-name").innerHTML = ticker +
          (naCarteira ? '<span class="pin">● na carteira</span>' : "");
        $("tk-price").textContent = R.formataPreco(dado.preco);
        $("tk-subsetor").textContent = dado.subsetor || dado.setor || "—";
        $("tk-stamp").textContent = "última run · " + R.formataData(dados.generatedAt);

        // Bloco fundamentalista
        $("fund-score").textContent = dado.avaliacao_fundamentalista ?? "—";
        const sinal = dado.fundamental_signal;
        const sinalEl = $("fund-sinal");
        sinalEl.textContent = sinal > 0 ? "compra" : sinal < 0 ? "venda" : "neutro";
        sinalEl.classList.remove("up", "down");
        if (sinal > 0) sinalEl.classList.add("up");
        else if (sinal < 0) sinalEl.classList.add("down");
        // sub "baseado no ranking" e fixo no HTML.

        $("fund-pos").textContent = dado.posicao_setorial || "—";

        // Stat %_to_MMA50 (4o card do fund-row)
        const pctMma50 = dado.pct_to_mma50;
        const pctEl = $("fund-pct-mma50");
        pctEl.textContent = R.formataPercentual(pctMma50);
        pctEl.classList.remove("up", "down");
        if (pctMma50 !== null && pctMma50 !== undefined) {
          pctEl.classList.add(pctMma50 >= 0 ? "up" : "down");
        }

        // Régua S/R
        $("ruler").appendChild(R.montaReguaSR(dado));

        // Meta-pair
        const std = dado.std_raking_value_by_mslf;
        $("meta-std").textContent = std !== null && std !== undefined ? `${std} / 3` : "—";
        const mom = dado.momentum_break_by_mslf;
        const momEl = $("meta-momentum");
        momEl.textContent = R.formataSinal(mom);
        momEl.classList.remove("up", "down");
        if (mom > 0) momEl.classList.add("up");
        else if (mom < 0) momEl.classList.add("down");

        // Bloco da carteira (7d)
        const tabela = $("carteira-table");

        function celula(className, conteudo) {
          const el = document.createElement("div");
          el.className = className;
          if (conteudo instanceof Node) el.appendChild(conteudo);
          else el.textContent = conteudo;
          return el;
        }

        for (const t of (dados.carteira || [])) {
          const dadoT = dados.tickers[t];
          if (!dadoT) continue;  // ticker da carteira ausente do latest.json -> pula

          const row = document.createElement("div");
          row.className = "c-row" + (t === ticker ? " active" : "");
          row.addEventListener("click", () => {
            window.location.href = R.urlDoTicker(t);
          });

          row.appendChild(celula("c-tk", t));
          row.appendChild(celula("c-mini", R.montaMiniReguaSR(dadoT)));
          row.appendChild(celula("c-price", R.formataPreco(dadoT.preco)));

          tabela.appendChild(row);
        }

        $("blocks").hidden = false;
      } catch (err) {
        console.error(err);
        $("status").hidden = false;
        $("status").classList.add("error");
        $("status").textContent = "Falha ao carregar dados: " + err.message;
      }
    })();
  </script>
</body>
</html>
